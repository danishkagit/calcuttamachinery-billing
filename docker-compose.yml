version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: cm-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gstbilling

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cm-server
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/gstbilling
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
    ports:
      - "5000:5000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: cm-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  mongo_data:
